<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 44" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- ── Icon block ── -->
  <rect x="2" y="2" width="40" height="40" rx="10" fill="url(#g1)"/>

  <!-- Film strip notches top -->
  <rect x="8"  y="2" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="16" y="2" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="24" y="2" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="32" y="2" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <!-- Film strip notches bottom -->
  <rect x="8"  y="38" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="16" y="38" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="24" y="38" width="4" height="4" rx="1" fill="white" opacity="0.25"/>
  <rect x="32" y="38" width="4" height="4" rx="1" fill="white" opacity="0.25"/>

  <!-- Play button -->
  <path d="M16 14 L16 30 L30 22 Z" fill="white"/>

  <!-- AI 4-point star sparkle -->
  <path d="M4 0 L4.8 3.2 L8 4 L4.8 4.8 L4 8 L3.2 4.8 L0 4 L3.2 3.2 Z"
        fill="white" opacity="0.9"
        transform="translate(29.5, 7) scale(0.65)"/>

  <!-- ── Wordmark ── -->
  <!-- "AI" gradient -->
  <text x="52" y="27"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="800"
    fill="url(#g2)" letter-spacing="-0.5">AI</text>

  <!-- "Video" -->
  <text x="74" y="27"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="700"
    fill="currentColor" letter-spacing="-0.5">Video</text>

  <!-- Tagline -->
  <text x="52" y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="7" font-weight="500"
    fill="currentColor" opacity="0.4" letter-spacing="1.5">GENERATOR</text>
</svg>
