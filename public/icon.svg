<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Inner glow for play button -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle inner highlight (top edge) -->
  <rect x="0" y="0" width="64" height="32" rx="16" fill="white" opacity="0.06"/>

  <!-- Film strip notches — top -->
  <rect x="10" y="0" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="22" y="0" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="34" y="0" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="46" y="0" width="6" height="6" rx="2" fill="white" opacity="0.22"/>

  <!-- Film strip notches — bottom -->
  <rect x="10" y="58" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="22" y="58" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="34" y="58" width="6" height="6" rx="2" fill="white" opacity="0.22"/>
  <rect x="46" y="58" width="6" height="6" rx="2" fill="white" opacity="0.22"/>

  <!-- Play triangle (centered, slightly right-offset for optical balance) -->
  <path d="M24 19 L24 45 L46 32 Z" fill="white" filter="url(#glow)"/>

  <!-- AI sparkle — 4-point star, top-right -->
  <g transform="translate(44, 12)">
    <path d="M5 0
             C5 2.76 5 2.76 7.76 5
             C5 5 5 5 5 7.76
             C5 5 5 5 2.24 5
             C5 5 5 5 5 2.24
             Z"
          fill="white" opacity="0.95"/>
    <!-- tiny center dot -->
    <circle cx="5" cy="5" r="1" fill="white" opacity="0.6"/>
  </g>

  <!-- Small secondary sparkle — bottom-left -->
  <g transform="translate(10, 44) scale(0.55)">
    <path d="M5 0
             C5 2.76 5 2.76 7.76 5
             C5 5 5 5 5 7.76
             C5 5 5 5 2.24 5
             C5 5 5 5 5 2.24
             Z"
          fill="white" opacity="0.45"/>
  </g>
</svg>
